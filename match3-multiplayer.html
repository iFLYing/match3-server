<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>咖啡老师 - 三消对战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#2d2d2d;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  min-height:100dvh;
  font-family:'Courier New',monospace;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-user-select:none;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
#game-container{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}
#game-wrapper{
  background:linear-gradient(135deg,#4a4a4a,#2d2d2d);
  border:4px solid #8b7355;
  border-radius:8px;
  padding:20px 30px;
  box-shadow:0 0 40px rgba(0,0,0,0.6),inset 0 0 20px rgba(0,0,0,0.3);
  position:relative;
  transform-origin:center center;
  will-change:transform;
}
#header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  padding:0 4px;
}
#title{
  color:#fff;
  font-size:22px;
  font-weight:bold;
  text-shadow:3px 3px 0 #3d3d3d,0 0 10px rgba(0,200,255,0.3);
  letter-spacing:2px;
}
#title span{color:#55ff55;}
#score-box{
  color:#fff;
  font-size:18px;
  background:#3d3d3d;
  border:2px solid #5d5d5d;
  padding:6px 16px;
  border-radius:4px;
  text-shadow:1px 1px 0 #222;
}
#score-box span{color:#ffff55;font-size:22px;font-weight:bold;}
canvas{
  display:block;
  border:3px solid #6b5b45;
  border-radius:4px;
  cursor:pointer;
  image-rendering:pixelated;
  background:#1a1a2e;
}
#info-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
  color:#aaa;
  font-size:13px;
  padding:0 4px;
}
#combo-display{
  color:#ffaa00;
  font-weight:bold;
  min-height:20px;
  text-align:center;
  flex:1;
}
#info-left, #info-right{
  display:flex;
  gap:6px;
  min-width:100px;
}
#info-right{justify-content:flex-end;}
#btn-reset, #btn-home{
  background:#555;
  border:2px solid #777;
  color:#fff;
  padding:4px 14px;
  font-family:'Courier New',monospace;
  font-size:14px;
  cursor:pointer;
  border-radius:3px;
}
#btn-reset:hover{background:#777;border-color:#999;}
#btn-home{background:#555;border:2px solid #777;color:#fff;padding:4px 14px;font-family:'Courier New',monospace;font-size:14px;cursor:pointer;border-radius:3px;}
#btn-home:hover{background:#777;border-color:#999;}
/* ── Settings / Customization ── */
#mode-screen, #room-screen {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:60px 40px; min-height:400px;
}
#mode-screen h1, #room-screen h2 {
  color:#fff; margin-bottom:30px;
  font-size:32px; letter-spacing:3px;
}
#mode-screen h1 span{color:#55ff55;}
#mode-screen p{color:#aaa;margin-bottom:30px;font-size:14px;}
.mode-btn, .room-btn {
  background:#3d3d3d; border:2px solid #5d5d5d;
  color:#fff; font-size:20px; padding:14px 40px;
  margin:10px; border-radius:6px; cursor:pointer;
  font-family:'Courier New',monospace;
  transition:all 0.15s;
  min-width:220px;
}
.mode-btn:hover, .room-btn:hover{background:#555;border-color:#888;}
.mode-btn.primary{border-color:#00F0FF;color:#00F0FF;}
.mode-btn.primary:hover{background:#003344;}
#room-code-input{
  background:#3d3d3d; border:2px solid #5d5d5d;
  color:#fff; font-size:28px; padding:10px 20px;
  text-align:center; letter-spacing:8px; width:200px;
  border-radius:4px; font-family:'Courier New',monospace;
  margin:10px 0 20px;
}
#display-code{
  color:#00F0FF; font-size:40px; font-weight:bold;
  letter-spacing:10px; margin:15px 0; user-select:all;
}
.status-msg{color:#aaa;font-size:14px;margin-top:20px;min-height:20px;}
.status-msg.wait{color:#ffaa00;}
.status-msg.ok{color:#55ff55;}
.status-msg.err{color:#ff5555;}
#back-btn{
  background:transparent; border:1px solid #555;
  color:#888; padding:6px 16px; border-radius:4px;
  cursor:pointer; font-size:12px; font-family:'Courier New',monospace;
  margin-top:20px;
}
#back-btn:hover{border-color:#888;color:#fff;}
/* ── In-game multiplayer bar ── */
#vs-bar{
  display:flex; justify-content:center; align-items:center;
  margin-bottom:10px; gap:20px;
}
.vs-side{text-align:center;min-width:100px;}
.vs-name{font-size:12px;color:#888;margin-bottom:2px;}
.vs-score{font-size:30px;font-weight:bold;color:#fff;}
.vs-divider{font-size:22px;color:#ffaa00;}
#room-code-bar{
  color:#555; font-size:12px; text-align:center;
  margin-bottom:4px;
}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════════
// ─── CONFIG ────────────────────────────────────────────
// Change this to your server address when deployed
const SERVER_URL = 'ws://localhost:3001';

const ROWS = 8;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

// ─── MULTIPLAYER STATE ──────────────────────────────────
let gameMode = 'single'; // 'single' | 'multi'
let ws = null;
let roomCode = '';
let myIndex = 0; // 0 = player 1, 1 = player 2
let myTurn = true;
let opponentScore = 0;
let multiScores = [0, 0];
let gameStarted = false;

// ══════════════════════════════════════════════════════════
// ─── BLOCK TEXTURES ────────────────────────────────────
const BLOCK_TYPES = [
  { id:'diamond',  name:'钻石', main:'#5BC0DE', light:'#A8E6F3', dark:'#3A8BA8' },
  { id:'emerald',  name:'绿宝石',main:'#47D48E', light:'#8EEDB8', dark:'#2DA16A' },
  { id:'gold',     name:'金块',  main:'#F5C542', light:'#FBE38E', dark:'#C99F26' },
  { id:'iron',     name:'铁块',  main:'#B8BCC4', light:'#D8DBE0', dark:'#8E929A' },
  { id:'redstone', name:'红石',  main:'#E74C3C', light:'#F1948A', dark:'#B03A2E' },
  { id:'lapis',    name:'青金石',main:'#4A7BC4', light:'#85AEE8', dark:'#2E5A99' },
  { id:'rainbow',  name:'彩虹',  main:'#FFFFFF', light:'#FFFFFF', dark:'#888888' },
];

function generateTexture(typeIdx, size) {
  const t = BLOCK_TYPES[typeIdx];
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const cx = c.getContext('2d');
  cx.fillStyle = t.main;
  cx.fillRect(0,0,size,size);
  const p = size / 8;
  for (let r = 0; r < 8; r++) {
    for (let c2 = 0; c2 < 8; c2++) {
      const x = c2 * p, y = r * p;
      if (r === 0 || c2 === 0) { cx.fillStyle = t.light; cx.globalAlpha = 0.3; cx.fillRect(x, y, p, p); cx.globalAlpha = 1; }
      if (r === 7 || c2 === 7) { cx.fillStyle = t.dark; cx.globalAlpha = 0.4; cx.fillRect(x, y, p, p); cx.globalAlpha = 1; }
    }
  }
  switch (t.id) {
    case 'diamond': {
      cx.fillStyle = '#fff'; cx.globalAlpha = 0.6; cx.fillRect(2*p,1*p,2*p,1*p); cx.fillRect(1*p,2*p,4*p,1*p); cx.fillRect(2*p,3*p,2*p,1*p);
      cx.globalAlpha = 0.3; cx.fillRect(3*p,5*p,2*p,1*p); cx.globalAlpha = 1; break;
    }
    case 'emerald': {
      cx.fillStyle = t.light; cx.globalAlpha = 0.5; cx.fillRect(1*p,1*p,6*p,1*p); cx.fillRect(2*p,2*p,4*p,1*p); cx.fillRect(3*p,3*p,2*p,1*p);
      cx.fillStyle = t.dark; cx.globalAlpha = 0.3; cx.fillRect(0,6*p,3*p,2*p); cx.fillRect(5*p,6*p,3*p,2*p); cx.globalAlpha = 1; break;
    }
    case 'gold': {
      cx.fillStyle = t.light; cx.globalAlpha = 0.4; cx.fillRect(1*p,1*p,2*p,2*p); cx.fillRect(5*p,3*p,2*p,2*p); cx.fillRect(2*p,5*p,2*p,2*p);
      cx.fillStyle = t.dark; cx.globalAlpha = 0.3; cx.fillRect(3*p,0,2*p,1*p); cx.fillRect(0,3*p,1*p,2*p); cx.fillRect(6*p,1*p,1*p,2*p);
      cx.globalAlpha = 1; break;
    }
    case 'iron': {
      cx.fillStyle = t.light; cx.globalAlpha = 0.3; cx.fillRect(1*p,1*p,1*p,1*p); cx.fillRect(3*p,2*p,1*p,1*p); cx.fillRect(5*p,1*p,1*p,1*p); cx.fillRect(2*p,4*p,1*p,1*p); cx.fillRect(5*p,5*p,1*p,1*p);
      cx.fillStyle = t.dark; cx.globalAlpha = 0.25; cx.fillRect(0,2*p,1*p,1*p); cx.fillRect(4*p,3*p,1*p,1*p); cx.fillRect(2*p,6*p,1*p,1*p); cx.fillRect(6*p,4*p,1*p,1*p);
      cx.globalAlpha = 1; break;
    }
    case 'redstone': {
      cx.fillStyle = t.dark; cx.globalAlpha = 0.5; cx.fillRect(1*p,1*p,2*p,2*p); cx.fillRect(5*p,4*p,2*p,2*p); cx.fillRect(2*p,5*p,2*p,2*p);
      cx.fillStyle = t.light; cx.globalAlpha = 0.3; cx.fillRect(3*p,5*p,1*p,1*p); cx.fillRect(5*p,1*p,1*p,1*p); cx.fillRect(0,4*p,1*p,1*p);
      cx.globalAlpha = 1; break;
    }
    case 'lapis': {
      cx.fillStyle = t.light; cx.globalAlpha = 0.35; cx.fillRect(2*p,0,2*p,2*p); cx.fillRect(4*p,2*p,2*p,2*p); cx.fillRect(2*p,4*p,2*p,2*p); cx.fillRect(0,2*p,2*p,2*p);
      cx.fillStyle = t.dark; cx.globalAlpha = 0.3; cx.fillRect(4*p,5*p,2*p,2*p); cx.fillRect(0,5*p,2*p,2*p); cx.globalAlpha = 1; break;
    }
    case 'rainbow': {
      // Rainbow gradient stripes
      var colors = ['#FF0000','#FF8800','#FFFF00','#00FF00','#0088FF','#8800FF'];
      for (var ri = 0; ri < 6; ri++) {
        cx.fillStyle = colors[ri]; cx.globalAlpha = 0.85;
        cx.fillRect(ri*p, 0, p+1, size);
        cx.globalAlpha = 1;
      }
      // Star in center
      cx.fillStyle = '#fff'; cx.globalAlpha = 0.7;
      cx.fillRect(3*p, 1*p, 2*p, 1*p); cx.fillRect(1*p, 3*p, 2*p, 1*p);
      cx.fillRect(5*p, 3*p, 2*p, 1*p); cx.fillRect(3*p, 5*p, 2*p, 1*p);
      cx.fillRect(2*p, 2*p, 4*p, 4*p);
      cx.globalAlpha = 0.4;
      cx.fillRect(3*p, 3*p, 2*p, 2*p);
      cx.globalAlpha = 1; break;
    }
  }
  cx.strokeStyle = 'rgba(0,0,0,0.2)'; cx.lineWidth = 1; cx.strokeRect(0.5,0.5,size-1,size-1);
  return c;
}
const TEXTURES = BLOCK_TYPES.map((_, i) => generateTexture(i, 16));

// ══════════════════════════════════════════════════════════
// ─── GAME STATE ────────────────────────────────────────
const board = [];
let selected = null;
let score = 0;
let chainCombo = 0;
let animating = false;
let _chainTimeout = null;
let _clearComboTimeout = null;
let _animFrameId = null;

// ══════════════════════════════════════════════════════════
// ─── BOARD HELPERS ─────────────────────────────────────
let _corruptionDetected = false;
function setTile(r, c, v) {
  if (_corruptionDetected) { board[r][c] = v; return; }
  if (v !== null && (typeof v !== 'number' || !Number.isInteger(v) || v < 0 || v >= BLOCK_TYPES.length)) {
    console.error('!!! CORRUPTION ORIGIN !!! setTile(', r, c, ',', v, ')');
    console.trace();
    _corruptionDetected = true;
    v = Math.floor(Math.random() * BLOCK_TYPES.length);
  }
  board[r][c] = v;
}

function gridX(col) { return 10 + PAD + col * (TILE_PX + PAD); }
function gridY(row) { return 10 + PAD + row * (TILE_PX + PAD); }

function initBoard() {
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    for (let c = 0; c < COLS; c++) {
      let type;
      do { type = Math.floor(Math.random() * (BLOCK_TYPES.length - 1)); } while (wouldMatch(r, c, type));
      setTile(r, c, type);
    }
  }
}

function wouldMatch(row, col, type) {
  // Rainbow blocks should not appear randomly on init
  if (type === 6) return true;
  if (col >= 2 && isMatchType(board[row][col-1], type) && isMatchType(board[row][col-2], type)) return true;
  if (row >= 2 && isMatchType(board[row-1][col], type) && isMatchType(board[row-2][col], type)) return true;
  return false;
}

// Check if two tile types match (rainbow = 6 matches anything)
function isMatchType(a, b) {
  if (a === null || b === null) return false;
  if (a === 6 || b === 6) return true;
  return a === b;
}

function getMatches() {
  const matched = new Set();
  let maxStreak = 0;
  let maxSameStreak = 0;
  const groups = [];
  for (let r = 0; r < ROWS; r++) {
    let streak = 1;
    let sameStreak = 1;
    for (let c = 1; c < COLS; c++) {
      var a = board[r][c], b = board[r][c-1];
      if (a !== null && b !== null && isMatchType(a, b)) {
        streak++;
        if (a === b && a !== 6) { sameStreak++; }
        else { if (sameStreak > maxSameStreak) maxSameStreak = sameStreak; sameStreak = 1; }
      } else {
        if (streak >= 3) { for (let k = c - streak; k < c; k++) matched.add(r * COLS + k); if (streak > maxStreak) maxStreak = streak; groups.push(streak); }
        if (sameStreak >= 3) { if (sameStreak > maxSameStreak) maxSameStreak = sameStreak; }
        streak = 1; sameStreak = 1;
      }
    }
    if (streak >= 3) { for (let k = COLS - streak; k < COLS; k++) matched.add(r * COLS + k); if (streak > maxStreak) maxStreak = streak; groups.push(streak); }
    if (sameStreak >= 3) { if (sameStreak > maxSameStreak) maxSameStreak = sameStreak; }
  }
  for (let c = 0; c < COLS; c++) {
    let streak = 1;
    let sameStreak = 1;
    for (let r = 1; r < ROWS; r++) {
      var a = board[r][c], b = board[r-1][c];
      if (a !== null && b !== null && isMatchType(a, b)) {
        streak++;
        if (a === b && a !== 6) { sameStreak++; }
        else { if (sameStreak > maxSameStreak) maxSameStreak = sameStreak; sameStreak = 1; }
      } else {
        if (streak >= 3) { for (let k = r - streak; k < r; k++) matched.add(k * COLS + c); if (streak > maxStreak) maxStreak = streak; groups.push(streak); }
        if (sameStreak >= 3) { if (sameStreak > maxSameStreak) maxSameStreak = sameStreak; }
        streak = 1; sameStreak = 1;
      }
    }
    if (streak >= 3) { for (let k = ROWS - streak; k < ROWS; k++) matched.add(k * COLS + c); if (streak > maxStreak) maxStreak = streak; groups.push(streak); }
    if (sameStreak >= 3) { if (sameStreak > maxSameStreak) maxSameStreak = sameStreak; }
  }
  const positions = [...matched].map(v => ({ r: Math.floor(v / COLS), c: v % COLS }));
  return { positions, maxStreak, maxSameStreak, groups };
}

// ══════════════════════════════════════════════════════════
// ─── SOUND EFFECTS ─────────────────────────────────────
let audioCtx = null;
let audioReady = false;

function initAudio() {
  if (audioReady) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { audioCtx.resume().catch(function(){}); }
    audioReady = true;
  } catch(e) {}
}

function playMatchSound(matchSize) {
  if (!audioReady) return;
  try {
    if (matchSize >= 5) playMatch5Plus();
    else if (matchSize === 4) playMatch4();
    else playMatch3Pop();
  } catch(e) {}
}

function playMatch3Pop() {
  if (!audioReady) return;
  try {
    const ctx = audioCtx, now = ctx.currentTime;
    const gain = ctx.createGain(); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.7, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    const osc = ctx.createOscillator(); osc.connect(gain);
    osc.frequency.setValueAtTime(523, now); osc.frequency.exponentialRampToValueAtTime(780, now + 0.06);
    osc.type = 'triangle'; osc.start(now); osc.stop(now + 0.12);
  } catch(e) {}
}

function playMatch4() {
  if (!audioReady) return;
  try {
    const ctx = audioCtx, now = ctx.currentTime;
    const gain = ctx.createGain(); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.75, now); gain.gain.linearRampToValueAtTime(0.4, now + 0.15); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
    const osc = ctx.createOscillator(); osc.connect(gain);
    osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(900, now + 0.18);
    osc.type = 'sine'; osc.start(now); osc.stop(now + 0.35);
  } catch(e) {}
}

function playMatch5Plus() {
  if (!audioReady) return;
  try {
    const ctx = audioCtx, now = ctx.currentTime;
    const gain = ctx.createGain(); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.85, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.25); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
    const chord = [523, 659, 784];
    chord.forEach((freq, i) => {
      const osc = ctx.createOscillator(); const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.35, now + i * 0.04); g2.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
      osc.connect(g2); g2.connect(ctx.destination);
      osc.frequency.setValueAtTime(freq, now + i * 0.04); osc.type = 'triangle';
      osc.start(now + i * 0.04); osc.stop(now + 0.6);
    });
    const gSpark = ctx.createGain(); gSpark.connect(ctx.destination);
    gSpark.gain.setValueAtTime(0.3, now + 0.1); gSpark.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    const osc2 = ctx.createOscillator(); osc2.connect(gSpark);
    osc2.frequency.setValueAtTime(1047, now + 0.1); osc2.frequency.linearRampToValueAtTime(1319, now + 0.25);
    osc2.type = 'sine'; osc2.start(now + 0.1); osc2.stop(now + 0.4);
  } catch(e) {}
}

function playFailSwap() {
  if (!audioReady) return;
  try {
    const ctx = audioCtx, now = ctx.currentTime;
    const gain = ctx.createGain(); gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.35, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    const osc = ctx.createOscillator(); osc.connect(gain);
    osc.frequency.setValueAtTime(180, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.06);
    osc.type = 'sawtooth'; osc.start(now); osc.stop(now + 0.1);
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
// ─── MATCH FLASH STATE ─────────────────────────────────
let _flashState = null;

// ══════════════════════════════════════════════════════════
// ─── ANIMATION HELPERS ─────────────────────────────────
let animations = [];
function clearAnims() { animations = []; animating = false; }
function cancelAllPending() {
  if (_chainTimeout) { clearTimeout(_chainTimeout); _chainTimeout = null; }
  if (_clearComboTimeout) { clearTimeout(_clearComboTimeout); _clearComboTimeout = null; }
  if (_animFrameId) { cancelAnimationFrame(_animFrameId); _animFrameId = null; }
}

// ══════════════════════════════════════════════════════════
// ─── SWAP LOGIC ────────────────────────────────────────
function trySwap(r1, c1, r2, c2) {
  if (animating) return;
  if (gameOver) return;
  if (gameMode === 'multi' && !gameStarted) return;
  selected = null;

  const t1 = board[r1][c1];
  const t2 = board[r2][c2];
  const validType = v => typeof v === 'number' && Number.isInteger(v) && v >= 0 && v < BLOCK_TYPES.length;
  if (!validType(t1) || !validType(t2)) {
    animating = false; render(); return;
  }

  const dur = 150;
  let start = null;
  let swapped = false;
  animating = true;

  function swapTick(t) {
    if (!start) start = t;
    const dt = t - start;
    const p = Math.min(dt / dur, 1);
    render();
    if (p < 1) {
      _animFrameId = requestAnimationFrame(swapTick);
    } else if (!swapped) {
      swapped = true;
      setTile(r1, c1, t2); setTile(r2, c2, t1);
      const matchResult = getMatches();
      if (matchResult.positions.length > 0) {
        processMatches(matchResult);
      } else {
        playFailSwap();
        let start2 = null;
        function swapBackTick(ts) {
          if (!start2) start2 = ts;
          const dt2 = ts - start2;
          const p2 = Math.min(dt2 / dur, 1);
          render();
          if (p2 < 1) { _animFrameId = requestAnimationFrame(swapBackTick); }
          else {
            setTile(r1, c1, t1); setTile(r2, c2, t2);
            render(); animating = false;
          }
        }
        _animFrameId = requestAnimationFrame(swapBackTick);
      }
    }
  }
  _animFrameId = requestAnimationFrame(swapTick);
}

// ══════════════════════════════════════════════════════════
// ─── MATCH PROCESSING ──────────────────────────────────
function processMatches(matchResult) {
  const { positions: matches, maxStreak } = matchResult;
  chainCombo++;
  playMatchSound(maxStreak);

  var baseScore = maxStreak >= 5 ? 30 : (maxStreak === 4 ? 20 : 10);
  const comboMult = Math.min(chainCombo, 5);
  const addScore = baseScore * comboMult;
  score += addScore;
  document.getElementById('score').textContent = score;

  const comboEl = document.getElementById('combo-display');
  if (chainCombo > 1) { comboEl.textContent = `🔥 ${chainCombo}连消! ✦${addScore}`; }
  else if (maxStreak >= 5) { comboEl.textContent = `💎 五星连珠! ✦${addScore}`; }
  else if (maxStreak === 4) { comboEl.textContent = `✨ 四连消! ✦${addScore}`; }
  else { comboEl.textContent = `✦ +${addScore}`; }

  const capturedCombo = chainCombo;
  if (_clearComboTimeout) clearTimeout(_clearComboTimeout);
  _clearComboTimeout = setTimeout(() => {
    if (chainCombo <= capturedCombo) { comboEl.textContent = ''; }
  }, 1500);

  const matchSet = new Set(matches.map(m => `${m.r},${m.c}`));
  _flashState = { matchSet, progress: 0 };
  const flashDur = 300;
  let flashStart = null;

  function flashTick(t) {
    if (!flashStart) flashStart = t;
    const dt = t - flashStart;
    const p = Math.min(dt / flashDur, 1);
    _flashState.progress = p;
    render();
    if (p < 1) { _animFrameId = requestAnimationFrame(flashTick); }
    else {
      _flashState = null;
      // Spawn rainbow: check if 5+ same-type tiles in the match
      var rainbowPos = null;
      var typeCounts = {};
      for (var mi = 0; mi < matches.length; mi++) {
        var mm = matches[mi];
        var t = board[mm.r][mm.c];
        if (t !== null && t !== 6) typeCounts[t] = (typeCounts[t] || 0) + 1;
      }
      var spawnType = -1;
      for (var k in typeCounts) {
        if (typeCounts[k] >= 5) { spawnType = parseInt(k); break; }
      }
      if (spawnType >= 0) {
        // Replace a random tile of that type with rainbow
        var candidates = [];
        for (var mi = 0; mi < matches.length; mi++) {
          var mm = matches[mi];
          if (board[mm.r][mm.c] === spawnType) candidates.push(mm);
        }
        if (candidates.length > 0) rainbowPos = candidates[Math.floor(Math.random() * candidates.length)];
      }
      for (var mi = 0; mi < matches.length; mi++) {
        var m = matches[mi];
        if (rainbowPos && m.r === rainbowPos.r && m.c === rainbowPos.c) {
          setTile(m.r, m.c, 6); // rainbow block
        } else {
          setTile(m.r, m.c, null);
        }
      }
      applyGravity();
    }
  }
  _animFrameId = requestAnimationFrame(flashTick);
}

function applyGravity() {
  let moved = false;
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        setTile(writeRow, c, board[r][c]);
        if (writeRow !== r) { setTile(r, c, null); moved = true; }
        writeRow--;
      }
    }
    for (let r = writeRow; r >= 0; r--) { board[r][c] = Math.floor(Math.random() * (BLOCK_TYPES.length - 1)); moved = true; }
  }
  render();
  if (moved) {
    _chainTimeout = setTimeout(() => {
    _chainTimeout = null;
    const newMatches = getMatches();
    if (newMatches.positions.length > 0) {
      processMatches(newMatches);
      if (gameMode === 'multi') sendMoveToServer(); // sync after each chain
    }
      else {
        chainCombo = 0; animating = false;
        // Check game over
        if (gameMode === 'multi') {
          checkGameOver();
          sendMoveToServer();
        }
        setTimeout(function() {
          document.getElementById('combo-display').textContent = '';
        }, 1000);
      }
    }, 200);
  } else {
    chainCombo = 0; animating = false;
    if (gameMode === 'multi') {
      checkGameOver();
      sendMoveToServer();
    }
  }
}

// ─── GAME OVER ─────────────────────────────────────────
var gameOver = false;
var gameWinner = false;
var scoreLimit = 5000;
var gameTimer = 0;
var timerInterval = null;

function checkGameOver() {
  if (gameOver) return;
  if (score >= scoreLimit || opponentScore >= scoreLimit) { triggerGameOver(score >= scoreLimit); return; }
  if (gameTimer <= 0 && gameStarted) { triggerGameOver(score > opponentScore); return; }
}

function triggerGameOver(won) {
  gameOver = true;
  gameWinner = won;
  animating = false;
  selected = null;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  document.getElementById('gameover-actions').style.display = 'block';
  // Send result to opponent
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'game_over', scores: [myIndex === 0 ? score : opponentScore, myIndex === 0 ? opponentScore : score] }));
  }
  render();
}

function restartGame() {
  cancelAllPending(); clearAnims();
  gameOver = false; gameWinner = false;
  chainCombo = 0; score = 0; opponentScore = 0;
  multiScores = [0, 0];
  selected = null; _flashState = null; _corruptionDetected = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('combo-display').textContent = '';
  document.getElementById('gameover-actions').style.display = 'none';
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  initBoard();
  render();
  if (gameMode === 'multi' && gameTimer > 0) startTimer(gameTimer);
  fitScreen();
}

// ─── TIMER ─────────────────────────────────────────────
function startTimer(seconds) {
  if (timerInterval) clearInterval(timerInterval);
  gameTimer = seconds;
  var el = document.getElementById('timer-display');
  if (!el) return;
  el.style.display = seconds > 0 ? 'block' : 'none';
  if (seconds <= 0) return;
  timerInterval = setInterval(function() {
    gameTimer--;
    if (gameTimer <= 0) {
      gameTimer = 0;
      clearInterval(timerInterval); timerInterval = null;
      checkGameOver();
    }
    var m = Math.floor(gameTimer / 60);
    var s = gameTimer % 60;
    el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    if (gameOver) clearInterval(timerInterval);
  }, 1000);
}

// ══════════════════════════════════════════════════════════
// ─── RENDERING ─────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawBackground();
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(0, 0, CANVAS_W, 10); ctx.fillRect(0, 0, 10, CANVAS_H);
  ctx.fillRect(CANVAS_W-10, 0, 10, CANVAS_H); ctx.fillRect(0, CANVAS_H-10, CANVAS_W, 10);
  ctx.fillStyle = '#6b5b45';
  ctx.fillRect(0, 0, 10, 10); ctx.fillRect(CANVAS_W-10, 0, 10, 10);
  ctx.fillRect(0, CANVAS_H-10, 10, 10); ctx.fillRect(CANVAS_W-10, CANVAS_H-10, 10, 10);
  ctx.fillStyle = '#3a2d1a';
  ctx.fillRect(10, 10, GRID_W, GRID_H);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let type = board[r][c];
      if (type === null) continue;
      if (typeof type !== 'number' || !Number.isInteger(type) || type < 0 || type >= BLOCK_TYPES.length) {
        console.error('CORRUPTED TILE at', r, c, 'value=', type, 'skipping');
        continue;
      }

      const x = gridX(c); const y = gridY(r);
      let tileAlpha = 1;
      if (_flashState) {
        const key = `${r},${c}`;
        if (_flashState.matchSet.has(key)) { tileAlpha = 1 - _flashState.progress; }
      }
      if (tileAlpha <= 0) continue;
      ctx.globalAlpha = tileAlpha;
      const tex = TEXTURES[type];
      ctx.drawImage(tex, x, y, TILE_PX, TILE_PX);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(x, y, TILE_PX, 2); ctx.fillRect(x, y, 2, TILE_PX);
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.fillRect(x + TILE_PX - 2, y, 2, TILE_PX); ctx.fillRect(x, y + TILE_PX - 2, TILE_PX, 2);
      ctx.globalAlpha = 1;
      if (selected && selected.r === r && selected.c === c) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.strokeRect(x - 1, y - 1, TILE_PX + 2, TILE_PX + 2);
        ctx.shadowColor = '#fff'; ctx.shadowBlur = 12;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
        ctx.strokeRect(x - 2, y - 2, TILE_PX + 4, TILE_PX + 4); ctx.shadowBlur = 0;
      }
    }
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
  for (let r = 0; r <= ROWS; r++) {
    const y = 10 + PAD + r * (TILE_PX + PAD) - PAD/2;
    ctx.beginPath(); ctx.moveTo(10, y); ctx.lineTo(10 + GRID_W, y); ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    const x = 10 + PAD + c * (TILE_PX + PAD) - PAD/2;
    ctx.beginPath(); ctx.moveTo(x, 10); ctx.lineTo(x, 10 + GRID_H); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;

  // Game over overlay
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = 'bold 40px "Courier New", monospace';
    ctx.fillStyle = gameWinner ? '#55ff55' : '#ff5555';
    ctx.fillText(gameWinner ? 'YOU WIN! 🎉' : 'YOU LOSE', CANVAS_W/2, CANVAS_H/2 - 10);
    ctx.font = '16px "Courier New", monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('你: ' + score + '  对手: ' + opponentScore, CANVAS_W/2, CANVAS_H/2 + 45);
  }
  // ponytail: gameover-actions buttons shown/hidden outside render
}

function drawBackground() {
  const bgColors = ['#4a3728', '#3d2e20', '#5a4534', '#35291e'];
  const tileBg = 12;
  for (let y = 0; y < CANVAS_H; y += tileBg) {
    for (let x = 0; x < CANVAS_W; x += tileBg) {
      const idx = Math.floor((x / tileBg + y / tileBg * 13) % bgColors.length);
      ctx.fillStyle = bgColors[idx]; ctx.fillRect(x, y, tileBg, tileBg);
      for (let n = 0; n < 3; n++) {
        const px = x + Math.floor(Math.random() * tileBg);
        const py = y + Math.floor(Math.random() * tileBg);
        ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(px, py, 1, 1);
      }
    }
  }
}

// ─── INPUT ─────────────────────────────────────────────
canvas.addEventListener('click', (e) => {
  try {
    initAudio();
    if (animating) return;
    if (gameOver) return;
    if (gameMode === 'multi' && !gameStarted) return;

    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const x = gridX(c); const y = gridY(r);
        if (mx >= x && mx < x + TILE_PX && my >= y && my < y + TILE_PX) {
          handleClick(r, c); return;
        }
      }
    }
  } catch(ex) { console.error(ex); cancelAllPending(); animating = false; selected = null; _flashState = null; }
});

function handleClick(r, c) {
  if (board[r][c] === null) return;
  if (selected === null) { selected = { r, c }; render(); return; }
  if (selected.r === r && selected.c === c) { selected = null; render(); return; }
  const dr = Math.abs(selected.r - r);
  const dc = Math.abs(selected.c - c);
  if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) { trySwap(selected.r, selected.c, r, c); }
  else { selected = { r, c }; render(); }
}

// ─── WEBSOCKET (Multiplayer) ──────────────────────────
function connectWebSocket(onReady) {
  if (ws) {
    if (ws.readyState === 1) { if (onReady) onReady(); return; }
    ws.close();
  }

  setRoomStatus('正在连接服务器...', 'wait');
  ws = new WebSocket(SERVER_URL);
  let timedOut = false;
  const timeout = setTimeout(function() {
    timedOut = true;
    setRoomStatus('连接超时，请检查网络后重试', 'err');
    ws.close();
  }, 5000);

  ws.onopen = function() {
    if (timedOut) return;
    clearTimeout(timeout);
    setRoomStatus('已连接服务器', 'ok');
    if (onReady) setTimeout(onReady, 100);
  };

  ws.onmessage = function(e) {
    let msg;
    try { msg = JSON.parse(e.data); } catch(ex) { return; }

    switch (msg.type) {
      case 'connected':
        break;

      case 'room_created':
        roomCode = msg.code;
        var displayEl = document.getElementById('display-code');
        if (displayEl) {
          displayEl.textContent = roomCode;
          displayEl.style.display = 'block';
          document.getElementById('share-tip').style.display = 'block';
        }
        setRoomStatus('将房间号发送给好友', 'ok');
        break;

      case 'error':
        setRoomStatus(msg.message, 'err');
        break;

      case 'joined':
        setRoomStatus('已加入房间', 'ok');
        break;

      case 'game_start':
        gameOver = false;
        gameWinner = false;
        scoreLimit = msg.scoreLimit || 3000;
        if (msg.board) {
          for (var r = 0; r < ROWS; r++)
            for (var c = 0; c < COLS; c++)
              setTile(r, c, msg.board[r][c]);
        }
        multiScores = [0, 0];
        myIndex = msg.playerIndex;
        myTurn = true;
        gameStarted = true;
        score = 0;
        opponentScore = 0;
        enterGame();
        updateVsBar();
        startTimer(msg.timeLimit || 0);
        break;

      case 'score_update':
        opponentScore = msg.scores[1 - myIndex];
        multiScores = msg.scores;
        updateVsBar();
        checkGameOver();
        break;

      case 'opponent_left':
        setStatusMsg('⚠ 对手已断开连接', 'err');
        gameStarted = false;
        render();
        break;

      case 'game_result':
        if (!gameOver) {
          gameOver = true;
          gameWinner = msg.winner !== myIndex;
          if (msg.scores) { opponentScore = msg.scores[1 - myIndex]; score = msg.scores[myIndex]; }
          document.getElementById('gameover-actions').style.display = 'block';
          render();
        }
        break;
    }
  };

  ws.onclose = function() {
    if (!timedOut && gameMode === 'multi' && gameStarted) {
      setStatusMsg('连接已断开', 'err');
    }
  };

  ws.onerror = function() {
    if (!timedOut) setRoomStatus('连接失败，检查服务器地址', 'err');
  };
}

function sendMoveToServer() {
  if (!ws || ws.readyState !== 1 || !gameStarted) return;
  multiScores[myIndex] = score;
  ws.send(JSON.stringify({ type: 'score_update', scores: multiScores }));
}

// ─── RESPONSIVE SCALING ───────────────────────────────
const gameWrapper = document.getElementById('game-wrapper');
function fitScreen() {
  const wrapperW = gameWrapper.scrollWidth || 640;
  const wrapperH = gameWrapper.scrollHeight || 660;
  const pad = 16;
  const maxW = window.innerWidth - pad * 2;
  const maxH = window.innerHeight - pad * 2;
  const scale = Math.min(1, maxW / wrapperW, maxH / wrapperH);
  gameWrapper.style.transform = 'scale(' + scale + ')';
}
window.addEventListener('resize', fitScreen);
window.addEventListener('orientationchange', function() { setTimeout(fitScreen, 200); });

// ─── TOUCH SUPPORT (mobile) ───────────────────────────
let _touchId = null;
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  try {
    if (typeof initAudio === 'function') initAudio();
    if (animating) return;
    if (gameOver) return;
    if (gameMode === 'multi' && !gameStarted) return;
    var t = e.changedTouches[0];
    var rect = canvas.getBoundingClientRect();
    var mx = (t.clientX - rect.left) * (canvas.width / rect.width);
    var my = (t.clientY - rect.top) * (canvas.height / rect.height);
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var x = gridX(c), y = gridY(r);
        if (mx >= x && mx < x + TILE_PX && my >= y && my < y + TILE_PX) {
          if (typeof handleClick === 'function') handleClick(r, c);
          return;
        }
      }
    }
  } catch(ex) { console.error(ex); }
}, { passive: false });

});
